<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>협력사 발주·사진등록 포털 — 모바일 (사내 연계)</title>
<!-- ===== 하이브리드 앱(PWA) 메타 — 실제 모바일에서 풀스크린 앱처럼 동작 ===== -->
<meta name="theme-color" content="#1a2f4e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="협력사 포털">
<meta name="format-detection" content="telephone=no">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='180'%20height='180'%3E%3Crect%20width='180'%20height='180'%20rx='40'%20fill='%231a2f4e'/%3E%3Ctext%20x='90'%20y='118'%20font-size='90'%20text-anchor='middle'%3E%F0%9F%8F%AD%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --navy:#1a2f4e; --navy2:#27457a; --accent:#2f6fb3; --accent2:#4a8ed0;
    --red:#b3402f; --green:#2e7d52; --amber:#9a6b1f; --purple:#6b4a9a;
    --ink:#1c2530; --muted:#8a93a0; --line:#e6eaf0; --bg:#eef1f6;
    --soft:#f1f5fb; --softred:#fbeeec; --softgreen:#ecf5f0; --softamber:#faf3e4; --softpur:#f1ecf8;
    --card:#fff;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:'Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif; color:var(--ink); background:#dfe4ec; line-height:1.5; font-size:15px;
       min-height:100vh; min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:20px 12px;
       -webkit-text-size-adjust:100%; overscroll-behavior:none;}
  .phone{width:390px; max-width:100%; height:840px; max-height:96vh; background:var(--bg); border-radius:42px;
         box-shadow:0 24px 60px rgba(20,40,70,.28), 0 0 0 11px #11151c, 0 0 0 13px #2a2f38;
         overflow:hidden; position:relative; display:flex; flex-direction:column;}
  .notch{position:absolute; top:0; left:50%; transform:translateX(-50%); width:150px; height:26px; background:#11151c;
         border-bottom-left-radius:16px; border-bottom-right-radius:16px; z-index:60;}
  .appbar{background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff; padding:34px 18px 12px; display:flex; align-items:center; gap:10px; z-index:40;}
  .appbar .back{font-size:20px; width:26px; cursor:pointer; opacity:.95;}
  .appbar .ttl{font-size:16px; font-weight:700; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .appbar .sub{font-size:11px; opacity:.8; font-weight:400;}
  .appbar .bell{position:relative; font-size:18px; cursor:pointer;}
  .appbar .bell b{position:absolute; top:-5px; right:-6px; background:var(--red); color:#fff; font-size:9px; min-width:15px; height:15px;
                  border-radius:8px; display:flex; align-items:center; justify-content:center; padding:0 3px;}
  .synctag{background:var(--softgreen); color:var(--green); font-size:10.5px; text-align:center; padding:4px; font-weight:700;}
  .screen{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;}
  .screen::-webkit-scrollbar{width:0;}
  .pad{padding:14px;}
  .hidden{display:none !important;}
  .tabbar{display:flex; background:rgba(255,255,255,.92); backdrop-filter:saturate(180%) blur(12px); -webkit-backdrop-filter:saturate(180%) blur(12px); border-top:1px solid var(--line); padding:7px 0 calc(7px + env(safe-area-inset-bottom));}
  .tabbar .tab{flex:1; text-align:center; font-size:10.5px; color:var(--muted); cursor:pointer; padding:3px 0; transition:color .15s;}
  .tabbar .tab .ic{font-size:20px; display:block; line-height:1.2; transition:transform .18s cubic-bezier(.34,1.56,.64,1);}
  .tabbar .tab.on{color:var(--accent); font-weight:700;}
  .tabbar .tab.on .ic{transform:translateY(-2px) scale(1.12);}
  .tabbar .tab:active .ic{transform:scale(.9);}
  .login{height:100%; display:flex; flex-direction:column; justify-content:center; padding:34px 28px;
         background:linear-gradient(160deg,#1a2f4e 0%,#27457a 55%,#2f6fb3 100%); color:#fff;}
  .login .logo{font-size:40px; text-align:center; margin-bottom:6px;}
  .login h1{font-size:22px; text-align:center; font-weight:800;}
  .login .tag{font-size:12.5px; text-align:center; opacity:.85; margin:6px 0 30px;}
  .login label{font-size:12px; opacity:.85; display:block; margin:14px 0 5px;}
  .login input{width:100%; padding:13px 14px; border-radius:11px; border:none; font-size:15px; background:rgba(255,255,255,.95);}
  .login .btn{width:100%; margin-top:24px; padding:14px; border:none; border-radius:11px; background:#fff; color:var(--navy); font-size:16px; font-weight:800; cursor:pointer;}
  .login .hint{margin-top:18px; font-size:11.5px; opacity:.8; text-align:center; line-height:1.6; background:rgba(255,255,255,.12); border-radius:10px; padding:10px;}
  .card{background:var(--card); border-radius:14px; box-shadow:0 1px 4px rgba(20,40,70,.07); margin-bottom:12px; overflow:hidden;}
  .po-card{padding:13px 14px; cursor:pointer; border:1px solid transparent; transition:.12s;}
  .po-card:active{transform:scale(.99); border-color:var(--accent2);}
  .po-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .po-no{font-size:14px; font-weight:800; color:var(--navy);}
  .po-date{font-size:11px; color:var(--muted); margin-top:2px;}
  .po-item{font-size:13px; margin:9px 0 6px; color:#33414f;}
  .po-foot{display:flex; justify-content:space-between; align-items:center; margin-top:8px; gap:6px; flex-wrap:wrap;}
  .due{font-size:11.5px; color:var(--muted);} .due b{color:var(--red);}
  .badge{display:inline-block; font-size:10.5px; border-radius:20px; padding:3px 10px; font-weight:700; white-space:nowrap;}
  .st-new{background:var(--soft); color:var(--navy2);} .st-prod{background:var(--softamber); color:var(--amber);}
  .st-insp{background:var(--softpur); color:var(--purple);} .st-done{background:var(--softgreen); color:var(--green);}
  .photo-badge{font-size:10.5px; color:var(--muted);} .photo-badge b{color:var(--accent);}
  .searchbar{padding:12px 14px 4px; background:var(--bg); position:sticky; top:0; z-index:10;}
  .searchbar input{width:100%; padding:11px 14px; border-radius:11px; border:1px solid var(--line); font-size:14px; background:#fff;}
  .chips{display:flex; gap:7px; overflow-x:auto; padding:10px 14px 12px; background:var(--bg); position:sticky; top:55px; z-index:10;}
  .chips::-webkit-scrollbar{height:0;}
  .chip{flex:none; font-size:12px; padding:7px 13px; border-radius:20px; background:#fff; border:1px solid var(--line); color:var(--muted); cursor:pointer; white-space:nowrap;}
  .chip.on{background:var(--navy); color:#fff; border-color:var(--navy);}
  .sec{font-size:12px; font-weight:800; color:var(--navy2); margin:6px 2px 9px; display:flex; align-items:center; gap:6px;}
  .sec .cnt{font-weight:600; color:var(--muted);}
  .dh{background:#fff; border-radius:14px; padding:15px; margin-bottom:14px; box-shadow:0 1px 4px rgba(20,40,70,.07);}
  .dh .no{font-size:17px; font-weight:800; color:var(--navy);}
  .dh-grid{display:grid; grid-template-columns:1fr 1fr; gap:9px 12px; margin-top:13px;}
  .dh-grid div{font-size:12.5px;} .dh-grid b{display:block; font-size:10.5px; color:var(--muted); margin-bottom:1px; font-weight:600;}
  .line{display:flex; justify-content:space-between; gap:10px; padding:11px 0; border-bottom:1px solid var(--line);}
  .line:last-child{border-bottom:none;}
  .line .nm{font-size:13.5px; font-weight:700;} .line .sp{font-size:11.5px; color:var(--muted); margin-top:2px;}
  .line .qty{font-size:13px; text-align:right; white-space:nowrap;} .line .qty .u{font-size:11px; color:var(--muted);}
  .stepper{display:flex; align-items:center; margin:4px 0 6px;}
  .step{flex:1; text-align:center; position:relative;}
  .step .dot{width:26px; height:26px; border-radius:50%; background:#e3e8f0; color:#aab3c0; font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; margin:0 auto 5px; position:relative; z-index:2;}
  .step .lb{font-size:10px; color:var(--muted);}
  .step::before{content:""; position:absolute; top:13px; left:-50%; width:100%; height:3px; background:#e3e8f0; z-index:1;}
  .step:first-child::before{display:none;}
  .step.done .dot{background:var(--green); color:#fff;} .step.done::before{background:var(--green);}
  .step.cur .dot{background:var(--accent); color:#fff; box-shadow:0 0 0 4px var(--soft);}
  .step.cur .lb{color:var(--accent); font-weight:800;}
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:6px; border:none; border-radius:11px; cursor:pointer; font-size:14px; font-weight:700; padding:12px 16px;}
  .btn.pri{background:var(--accent); color:#fff;} .btn.pri:active{background:var(--navy2);}
  .btn.ghost{background:var(--soft); color:var(--navy2);}
  .btn.block{width:100%;} .btn.sm{font-size:12.5px; padding:9px 12px;}
  .btn-row{display:flex; gap:9px; margin-top:4px;}
  .pgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:4px;}
  .pcell{position:relative; aspect-ratio:1; border-radius:11px; overflow:hidden; background:#dde3ec; cursor:pointer;}
  .pcell img{width:100%; height:100%; object-fit:cover; display:block;}
  .pcell .tg{position:absolute; left:5px; bottom:5px; font-size:9px; background:rgba(20,40,70,.78); color:#fff; padding:2px 6px; border-radius:6px;}
  .pcell .ok{position:absolute; right:5px; top:5px; width:18px; height:18px; border-radius:50%; background:var(--green); color:#fff; font-size:11px; display:flex; align-items:center; justify-content:center;}
  .pcell .rej{position:absolute; right:5px; top:5px; width:18px; height:18px; border-radius:50%; background:var(--red); color:#fff; font-size:11px; display:flex; align-items:center; justify-content:center;}
  .padd{display:flex; flex-direction:column; align-items:center; justify-content:center; aspect-ratio:1; border:2px dashed #b9c4d4; border-radius:11px; color:var(--accent); cursor:pointer; background:#fff; gap:3px;}
  .padd .pl{font-size:26px; line-height:1;} .padd span{font-size:10.5px; font-weight:700;}
  .msg-wrap{display:flex; flex-direction:column; gap:10px;}
  .msg{max-width:80%; padding:10px 13px; border-radius:14px; font-size:13px;}
  .msg .mt{font-size:9.5px; color:var(--muted); margin-top:4px;}
  .msg.them{background:#fff; align-self:flex-start; border-bottom-left-radius:4px; box-shadow:0 1px 3px rgba(20,40,70,.07);}
  .msg.me{background:var(--accent); color:#fff; align-self:flex-end; border-bottom-right-radius:4px;}
  .msg.me .mt{color:rgba(255,255,255,.75); text-align:right;}
  .msg .who{font-size:10px; font-weight:700; color:var(--navy2); margin-bottom:3px;}
  .composer{display:flex; gap:8px; padding:10px 12px calc(10px + env(safe-area-inset-bottom)); background:#fff; border-top:1px solid var(--line); align-items:center;}
  .composer input{flex:1; padding:11px 14px; border-radius:22px; border:1px solid var(--line); font-size:14px; background:var(--bg);}
  .composer .send{width:42px; height:42px; flex:none; border-radius:50%; border:none; background:var(--accent); color:#fff; font-size:18px; cursor:pointer;}
  .prof-head{background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff; padding:24px 18px; border-radius:14px; margin-bottom:14px; text-align:center;}
  .prof-head .av{width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,.18); margin:0 auto 10px; font-size:28px; display:flex; align-items:center; justify-content:center;}
  .prof-head .nm{font-size:18px; font-weight:800;} .prof-head .co{font-size:12px; opacity:.85; margin-top:2px;}
  .prow{display:flex; justify-content:space-between; align-items:center; padding:14px; background:#fff; border-radius:11px; margin-bottom:9px; font-size:13.5px;}
  .prow .v{color:var(--muted);}
  .stat-row{display:flex; gap:9px; margin-bottom:14px;}
  .stat{flex:1; background:#fff; border-radius:13px; padding:13px 8px; text-align:center; box-shadow:0 1px 4px rgba(20,40,70,.07);}
  .stat .n{font-size:22px; font-weight:800; color:var(--navy);} .stat .l{font-size:10.5px; color:var(--muted); margin-top:2px;}
  .stat.amber .n{color:var(--amber);} .stat.red .n{color:var(--red);} .stat.green .n{color:var(--green);}
  .empty{text-align:center; color:var(--muted); padding:50px 20px; font-size:13px;}
  .empty .ic{font-size:40px; display:block; margin-bottom:10px; opacity:.5;}
  .lightbox{position:absolute; inset:0; background:rgba(10,15,22,.94); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;}
  .lightbox img{max-width:100%; max-height:62%; border-radius:10px;}
  .lightbox .lb-meta{color:#fff; font-size:12.5px; margin-top:14px; text-align:center; max-width:90%;}
  .lightbox .lb-meta .tg{display:inline-block; background:rgba(255,255,255,.18); padding:2px 9px; border-radius:8px; font-size:11px; margin-bottom:7px;}
  .lightbox .x{position:absolute; top:46px; right:20px; color:#fff; font-size:26px; cursor:pointer;}
  .lightbox .lb-act{display:flex; gap:9px; margin-top:18px;}
  .sheet-bg{position:absolute; inset:0; background:rgba(10,15,22,.5); z-index:90; display:flex; align-items:flex-end;}
  .sheet{background:#fff; width:100%; border-top-left-radius:20px; border-top-right-radius:20px; padding:8px 18px calc(20px + env(safe-area-inset-bottom)); animation:up .22s ease;}
  @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet .grab{width:40px; height:4px; background:#d3dae4; border-radius:3px; margin:8px auto 14px;}
  .sheet h3{font-size:15px; color:var(--navy); margin-bottom:4px;}
  .sheet .lab{font-size:11.5px; color:var(--muted); margin:14px 0 7px;}
  .tagpick{display:flex; gap:7px; flex-wrap:wrap;}
  .tagpick .tp{font-size:12px; padding:7px 13px; border-radius:20px; background:var(--soft); color:var(--navy2); cursor:pointer; border:1px solid transparent;}
  .tagpick .tp.on{background:var(--accent); color:#fff;}
  .sheet textarea{width:100%; border:1px solid var(--line); border-radius:11px; padding:11px; font-size:13.5px; resize:none; font-family:inherit; margin-top:4px;}
  .toast{position:absolute; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(20,40,70,.95); color:#fff; font-size:12.5px; padding:10px 18px; border-radius:22px; z-index:120; opacity:0; transition:.25s; white-space:nowrap; max-width:90%;}
  .toast.show{opacity:1; bottom:90px;}
  .note{font-size:11px; color:var(--muted); text-align:center; padding:14px 20px 4px; line-height:1.6;}
  .linkbar{background:var(--softpur); color:var(--purple); font-size:11px; padding:8px 14px; display:flex; align-items:center; gap:6px; justify-content:center; font-weight:700;}
  .fproc{display:flex; gap:5px; overflow-x:auto; padding:4px 0 8px;}
  .fproc::-webkit-scrollbar{height:0;}
  .fzone{display:flex; flex-direction:column; background:#eef2f8; border-radius:9px; padding:5px; flex:none;}
  .fzone.sup{background:#f1ecf8;} .fzone.erp{background:#e6f2ee;}
  .fzname{font-size:8.5px; font-weight:800; text-align:center; margin-bottom:4px; color:#8a93a0;}
  .fznodes{display:flex; gap:3px;}
  .fnode{width:44px; text-align:center;}
  .fnode .fc{width:26px;height:26px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;background:#fff;border:1.5px solid #cdd6e2;color:#9aa6b4;}
  .fnode .fl{font-size:8px;color:#8a93a0;margin-top:2px;line-height:1.1;}
  .fnode.done .fc{background:#2e7d52;border-color:#2e7d52;color:#fff;} .fnode.done .fl{color:#2e7d52;}
  .fnode.cur .fc{background:#6b4a9a;border-color:#6b4a9a;color:#fff;box-shadow:0 0 0 3px rgba(107,74,154,.18);} .fnode.cur .fl{color:#6b4a9a;font-weight:800;}
  .fnode.skip{opacity:.4;}

  /* ===== 실제 모바일/협소 화면: 폰 목업 베젤 제거 → 풀스크린 하이브리드 앱 ===== */
  @media (max-width:600px){
    body{padding:0; display:block; min-height:100dvh; background:var(--bg);}
    .phone{width:100%; max-width:none; height:100vh; height:100dvh; max-height:none; border-radius:0; box-shadow:none;}
    .notch{display:none;}
    .appbar{padding-top:max(env(safe-area-inset-top),14px);}
    .login{padding-top:max(env(safe-area-inset-top),34px);}
  }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>

  <!-- 인증: app/vendor-login.html에서 Supabase Auth 로그인 후 진입(세션 없으면 자동 리디렉트) -->
  <div id="app" class="hidden" style="display:flex; flex-direction:column; height:100%;">
    <div class="appbar">
      <span id="backBtn" class="back hidden" onclick="goBack()">‹</span>
      <div style="flex:1; overflow:hidden;">
        <div id="barTitle" class="ttl">발주 목록</div>
        <div id="barSub" class="sub">협력사 포털</div>
      </div>
      <span class="bell" onclick="showAlerts()">🔔<b id="bellCnt"></b></span>
    </div>
    <div class="synctag">🔗 사내 대시보드 실시간 연계 ON — 등록 즉시 구매·품질·생산·사업관리에 반영</div>
    <div id="screen" class="screen"></div>
    <div id="composer" class="composer hidden">
      <input id="msgInput" placeholder="구매 담당자에게 메시지…" onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="send" onclick="sendMsg()">➤</button>
    </div>
    <div class="tabbar" id="tabbar">
      <div class="tab on" data-tab="orders" onclick="switchTab('orders')"><span class="ic">📋</span>발주</div>
      <div class="tab" data-tab="photos" onclick="switchTab('photos')"><span class="ic">📷</span>사진</div>
      <div class="tab" data-tab="messages" onclick="switchTab('messages')"><span class="ic">💬</span>메시지</div>
      <div class="tab" data-tab="profile" onclick="switchTab('profile')"><span class="ic">👤</span>내정보</div>
    </div>
  </div>
  <div id="toast" class="toast"></div>
</div>
<input type="file" id="fileInput" accept="image/*" multiple class="hidden">

<script type="module">
/* ===== Supabase 연동 (협력사 세션 + 발주 데이터, RLS로 자기 거래처만) ===== */
import { supabase } from "../app/lib/supabaseClient.js";
import { portalApi } from "../app/lib/api.js";

// JWT(base64url, UTF-8) 디코드 → app_metadata(role/vendor_bp)
function claimsOf(session){
  if(!session || !session.access_token) return {};
  try{ let p=session.access_token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'); while(p.length%4)p+='=';
    return JSON.parse(decodeURIComponent(atob(p).split('').map(c=>'%'+c.charCodeAt(0).toString(16).padStart(2,'0')).join(''))).app_metadata||{}; }
  catch(e){ return {}; }
}
// 협력사 세션 확인 — 없거나 협력사 아니면 로그인 페이지로
async function loadSession(){
  const { data:{ session } } = await supabase.auth.getSession();
  if(!session){ location.replace('../app/vendor-login.html'); return null; }
  const am = claimsOf(session);
  if(am.role!=='vendor' || !(am.vendor_bp && am.vendor_bp.length)){
    location.replace('../app/vendor-login.html'); return null;
  }
  VENDOR.code = am.vendor_bp[0];
  VENDOR.user = session.user.email;
  VENDOR.contact = session.user.user_metadata?.contact_name || ''; // 계정 발급 시 등록된 담당자명 — 메시지 발신자 표기
  try{ const { data:vm } = await supabase.from('vendor_master').select('bp_nm').eq('bp_cd', VENDOR.code).maybeSingle(); VENDOR.name = (vm&&vm.bp_nm) || VENDOR.code; }
  catch(e){ VENDOR.name = VENDOR.code; }
  return session;
}
// 발주 로드(RLS 자기 거래처만) + 사진 signed URL 일괄 발급(api.js 캐시 — 만료 자동 재발급)
async function loadOrders(){
  orders = await portalApi.getOrders();
  const paths = orders.flatMap(o=>(o.photos||[]).map(p=>p.storage_path)).filter(Boolean);
  const urls = paths.length ? await portalApi.photoUrls(paths) : {};
  orders.forEach(o=>(o.photos||[]).forEach(p=>{ p.src = urls[p.storage_path] || PHOTO_FB; }));
}

/* ===== 데이터 (한일정밀, 사내 대시보드와 정합) ===== */
let VENDOR = { code:'', name:'', contact:'', user:'' }; // 담당 구매자는 발주별 o.buyer(실데이터)로 표시
const STATUS = { new:'신규 접수', prod:'생산중', insp:'검수요청', done:'완료' };
const STATUS_ORDER = ['new','prod','insp','done'];
const stCls = { new:'st-new', prod:'st-prod', insp:'st-insp', done:'st-done' };
const FSTAGES=[{k:'req',l:'구매요청',z:'jeil',ic:'📝'},{k:'po',l:'발주',z:'jeil',ic:'📋'},{k:'cfm',l:'발주확인',z:'sup',ic:'✅'},{k:'rcv',l:'접수',z:'sup',ic:'📥'},{k:'prd',l:'생산',z:'sup',ic:'🏭'},{k:'pho',l:'사진',z:'sup',ic:'📷'},{k:'isp',l:'검수요청',z:'sup',ic:'🔬',cond:true},{k:'shp',l:'출하',z:'sup',ic:'🚚'},{k:'grn',l:'입고',z:'erp',ic:'📦'},{k:'iv',l:'매입',z:'erp',ic:'💰'}];
const FIDX=k=>FSTAGES.findIndex(s=>s.k===k);
function fcur(o){ if(o.status==='new')return FIDX('rcv'); if(o.status==='prod')return o.photos.length?FIDX('pho'):FIDX('prd'); if(o.status==='insp')return FIDX('isp'); if(o.status==='done')return FIDX('iv'); return FIDX('cfm'); }
function fproc(o){ const cur=fcur(o); const sub=o.type!=='DIV'; const zs=[['jeil','JEIL'],['sup','협력사'],['erp','ERP']];
  return '<div class="fproc">'+zs.map(function(zz){var z=zz[0],zn=zz[1];var ns=FSTAGES.filter(function(s){return s.z===z;});
    return '<div class="fzone '+z+'"><div class="fzname">'+zn+'</div><div class="fznodes">'+ns.map(function(s){var i=FIDX(s.k);var skip=s.cond&&!sub;var cls=skip?'skip':(i<cur?'done':(i===cur?'cur':''));return '<div class="fnode '+cls+'"><div class="fc">'+(cls==='done'?'✓':s.ic)+'</div><div class="fl">'+s.l+'</div></div>';}).join('')+'</div></div>';
  }).join('')+'</div>'; }

// 사진 로드 실패·URL 만료 시 폴백 플레이스홀더(실사진은 Supabase Storage 서명 URL)
const PHOTO_FB='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><rect width='320' height='320' fill='#dde3ec'/><text x='160' y='150' font-size='44' text-anchor='middle'>📷</text><text x='160' y='196' font-size='15' fill='#66707e' text-anchor='middle' font-family='sans-serif'>사진을 불러오지 못했습니다</text></svg>")));
function photoErr(el){ el.onerror=null; el.src=PHOTO_FB; }
let orders = [];  // Supabase에서 로드 (portalApi.getOrders)

let view='orders', curOrder=null, filter='all', search='', uploadTag='작업';
const TAGS=['작업','완성','포장','출하'];
const $ = s => document.querySelector(s);
const screen = () => $('#screen');

async function initPortal(){
  const s = await loadSession(); if(!s) return;   // 세션 없으면 vendor-login으로 리디렉트됨
  await loadOrders();
  $('#app').classList.remove('hidden');
  switchTab('orders');
  // 사내 대시보드 변경 실시간 반영
  portalApi.subscribe(async ()=>{ await loadOrders(); if(view==='thread'){ curOrder=orders.find(o=>o.no===curOrder?.no)||curOrder; renderThread(); } else render(); });
}

function switchTab(tab){ view=tab; curOrder=null;
  document.querySelectorAll('.tabbar .tab').forEach(t=>t.classList.toggle('on', t.dataset.tab===tab));
  $('#tabbar').classList.remove('hidden'); render(); }
function openOrder(no){ curOrder=orders.find(o=>o.no===no); view='detail'; render(); }
function openThread(no){ curOrder=orders.find(o=>o.no===no); view='thread';
  // 사내 발신분 읽음 처리(DB) + 로컬 즉시 반영(벨·미읽음 배지)
  try{ portalApi.markRead && portalApi.markRead(no,'internal'); }catch(e){}
  (curOrder?.msgs||[]).forEach(m=>{ if(m.who==='them'&&!m.read_at) m.read_at=new Date().toISOString(); });
  render(); }
function goBack(){ if(view==='detail') switchTab('orders'); else if(view==='thread') switchTab('messages'); else switchTab('orders'); }

function render(){
  updateBell();
  const showBack=(view==='detail'||view==='thread');
  $('#backBtn').classList.toggle('hidden', !showBack);
  $('#composer').classList.toggle('hidden', view!=='thread');
  $('#tabbar').classList.toggle('hidden', view==='thread');
  $('#barSub').textContent = (view==='thread'||view==='detail') ? curOrder.no : VENDOR.name;
  const titles={orders:'발주 목록',detail:'발주 상세',photos:'사진 관리',messages:'메시지',profile:'내 정보',thread:curOrder?('💬 '+curOrder.no):'메시지'};
  $('#barTitle').textContent=titles[view];
  if(view==='orders') return renderOrders();
  if(view==='detail') return renderDetail();
  if(view==='photos') return renderPhotos();
  if(view==='messages') return renderMessages();
  if(view==='thread') return renderThread();
  if(view==='profile') return renderProfile();
}
function renderOrders(){
  const counts={all:orders.length}; STATUS_ORDER.forEach(s=>counts[s]=orders.filter(o=>o.status===s).length);
  let list=orders.filter(o=>filter==='all'||o.status===filter);
  if(search){const q=search.toLowerCase(); list=list.filter(o=>o.no.toLowerCase().includes(q)||(o.items||[]).some(i=>String(i.nm||'').toLowerCase().includes(q)||String(i.pn||'').toLowerCase().includes(q)));}
  list=list.slice().sort((a,b)=>new Date(a.due)-new Date(b.due));
  const chip=(k,l)=>`<div class="chip ${filter===k?'on':''}" onclick="setFilter('${k}')">${l} ${counts[k]||0}</div>`;
  screen().innerHTML=`<div class="searchbar"><input placeholder="🔍 발주번호 · 품명 · 품번 검색" value="${search}" oninput="setSearch(this.value)"></div>
    <div class="chips">${chip('all','전체')}${chip('new','신규')}${chip('prod','생산중')}${chip('insp','검수요청')}${chip('done','완료')}</div>
    <div class="pad">${list.length?list.map(o=>poCard(o)).join(''):`<div class="empty"><span class="ic">📭</span>조건에 맞는 발주가 없습니다.</div>`}
      <div class="note">ERP 발주 데이터 기준 · ${VENDOR.name}(${VENDOR.code}) 자사 발주만 표시 · 등록 내용은 사내 대시보드 실시간 연계</div></div>`;
}
function poCard(o){
  const pCnt=o.photos.length, rej=o.photos.filter(p=>p.chk==='rej').length;
  return `<div class="card po-card" onclick="openOrder('${o.no}')">
    <div class="po-top"><div><div class="po-no">${o.no} <span class="badge st-${o.status==='new'?'new':o.status}" style="font-size:9px">${o.type}</span></div><div class="po-date">발주일 ${o.date}</div></div>
      <span class="badge ${stCls[o.status]}">${STATUS[o.status]}</span></div>
    <div class="po-item">${o.items.map(i=>i.nm).join(', ')}</div>
    <div class="po-foot"><span class="due">납기 ${o.due} · ${daysLeft(o.due)}</span>
      <span class="photo-badge">📷 <b>${pCnt}</b>${rej?` · <span style="color:var(--red)">반려 ${rej}</span>`:''}${o.inspReqNo?' · 🔬검사신청':''}</span>
      <button class="btn ghost sm" style="padding:5px 11px;font-size:11px;flex:none" onclick="event.stopPropagation();openThread('${o.no}')">💬 메시지${o.msgs.length?' '+o.msgs.length:''}</button></div></div>`;
}
function setFilter(k){filter=k; render();}
function setSearch(v){search=v; renderOrders();}
function daysLeft(due){ const _t=new Date(); _t.setHours(0,0,0,0); const d=Math.ceil((new Date(due)-_t)/86400000);
  if(d<0) return `<b>${-d}일 경과</b>`; if(d===0) return `<b>오늘 마감</b>`; if(d<=3) return `<b>D-${d}</b>`; return `D-${d}`; }

// 알림 집계: 검수 반려 사진 + 사내 발신 미읽음 메시지(read_at 기준)
function alertCounts(){ let rej=0, msg=0;
  orders.forEach(o=>{ rej+=(o.photos||[]).filter(p=>p.chk==='rej').length;
    if((o.msgs||[]).some(m=>m.who==='them' && !m.read_at)) msg++; });
  return { rej, msg, total: rej+msg }; }
function updateBell(){ const c=alertCounts(); const b=$('#bellCnt'); if(b){ b.textContent=c.total||''; b.style.display=c.total?'flex':'none'; } }
function showAlerts(){ const c=alertCounts(); toast(c.total?`알림 ${c.total}건 · 검수반려 ${c.rej} · 새 메시지 ${c.msg}`:'새 알림이 없습니다'); }

function renderDetail(){
  const o=curOrder; const curIdx=STATUS_ORDER.indexOf(o.status);
  const _insp=o.inspection||null;
  const _rej=(o.photos||[]).filter(p=>p.chk==='rej');
  screen().innerHTML=`<div class="pad">
    ${_insp?`<div class="card pad" style="border-left:4px solid ${_insp.result==='합격'?'var(--green)':'var(--red)'}">
      <div style="font-size:13px;font-weight:800;color:${_insp.result==='합격'?'var(--green)':'var(--red)'}">🔬 검수 결과: ${_insp.result}</div>
      <div style="font-size:11.5px;color:var(--muted);margin-top:4px">판정자 <b>${_insp.by}</b> · ${_insp.at}${_insp.comment?` · ${_insp.comment}`:``} · 결과번호 ${_insp.resultNo||'-'}</div></div>`:``}
    ${_rej.length?`<div class="card pad" style="border-left:4px solid var(--red)">
      <div style="font-size:13px;font-weight:800;color:var(--red)">📷 사진 반려 ${_rej.length}장 — 재촬영 후 다시 등록해 주세요</div>
      <div style="font-size:11.5px;color:var(--muted);margin-top:4px">${_rej.map(p=>`${p.tag}${p.rejReason?` · 사유: ${p.rejReason}`:''}`).join('<br>')}</div></div>`:``}
    <div class="dh"><div style="display:flex; justify-content:space-between; align-items:center;">
      <span class="no">${o.no} <span class="badge st-new" style="font-size:10px">${o.type} 외주</span></span><span class="badge ${stCls[o.status]}">${STATUS[o.status]}</span></div>
      <div class="dh-grid"><div><b>발주일</b>${o.date}</div><div><b>납기</b>${o.due} (${daysLeft(o.due)})</div>
        <div><b>구매 담당</b>${o.buyer?`${o.buyer.name} (${o.buyer.team})`:'구매팀'}</div><div><b>검사신청</b>${o.inspReqNo||'<span style="color:var(--muted)">미신청</span>'}</div></div></div>
    <div class="card pad"><div class="sec">🔄 전체 프로세스 <span style="font-weight:600;color:var(--purple);font-size:10px">· 사내 연계</span></div>${fproc(o)}<div style="font-size:10px;color:var(--muted);margin-top:4px">협력사 단계는 내 등록에 따라 갱신 · ERP 입고·매입은 사내 자동 처리</div></div>
    <div class="card pad"><div class="sec">📦 발주 품목 <span class="cnt">${o.items.length}종</span></div>
      ${o.items.map(i=>`<div class="line"><div><div class="nm">${i.nm||'품목'}</div><div class="sp">${i.pn||''}${i.spec?` · ${i.spec}`:''}</div></div>
        <div class="qty">${(i.qty||0).toLocaleString()}<span class="u"> ${i.unit||''}</span><div class="sp">@${(i.price||0).toLocaleString()}원</div></div></div>`).join('')||'<div class="sp" style="color:var(--muted)">품목 정보 없음</div>'}</div>
    <div class="card pad"><div class="sec">🚦 진행 상태</div><div class="stepper">
      ${STATUS_ORDER.map((s,idx)=>`<div class="step ${idx<curIdx?'done':''} ${idx===curIdx?'cur':''}"><div class="dot">${idx<curIdx?'✓':idx+1}</div><div class="lb">${STATUS[s]}</div></div>`).join('')}</div>
      ${curIdx>=3?`<div style="text-align:center; color:var(--green); font-size:13px; font-weight:700; margin:12px 0 9px">✓ 완료된 발주 (검사 합격·매입 처리)</div>`:``}
      <div class="btn-row" style="margin-top:${curIdx>=3?'0':'12px'}">
        ${curIdx>0?`<button class="btn ghost block sm" onclick="cancelStatus()">◀ 단계 취소</button>`:``}
        ${curIdx<3?`<button class="btn pri block sm" onclick="advanceStatus()">▶ 다음 단계로 (${STATUS[STATUS_ORDER[curIdx+1]]})</button>`:``}
      </div>
      ${o.status==='insp'?`<div style="margin-top:10px; background:var(--softpur); color:var(--purple); border-radius:9px; padding:9px 12px; font-size:11.5px; font-weight:700">🔬 검수요청됨 → 검사신청 ${o.inspReqNo} 자동 생성 · 품질팀 검사 대기</div>`:''}</div>
    <div class="card pad"><div class="sec">📷 등록 사진 <span class="cnt">${o.photos.length}장</span> <span style="font-weight:600;color:var(--purple);font-size:10.5px">· 검사 증빙 연계</span></div>
      <div class="pgrid"><div class="padd" onclick="openUpload()"><span class="pl">＋</span><span>사진 등록</span></div>
        ${o.photos.map((p,i)=>pcell(p,i)).join('')}</div></div>
    <div class="btn-row"><button class="btn pri block" onclick="openThread('${o.no}')">💬 메시지 보내기 · 보기 (${o.msgs.length})</button></div>
    <div style="height:8px"></div></div>`;
}
function pcell(p,i){ const mark=p.chk==='ok'?`<span class="ok">✓</span>`:p.chk==='rej'?`<span class="rej">!</span>`:'';
  return `<div class="pcell" onclick="lightbox(${i})"><img src="${p.src}" onerror="photoErr(this)"><span class="tg">${p.tag}</span>${mark}</div>`; }
async function advanceStatus(){ const i=STATUS_ORDER.indexOf(curOrder.status);
  if(i>=3) return;
  const ns=STATUS_ORDER[i+1];
  try{
    if(ns==='insp'){ const r=await portalApi.requestInspection(curOrder.no); curOrder.inspReqNo=(r && r.insp_req_no)||('IR'+curOrder.no.slice(2)); curOrder.status='insp'; toast('검수요청 → 검사신청 '+curOrder.inspReqNo+' 생성 (사내 연계)'); }
    else { await portalApi.updateStatus(curOrder.no, ns); curOrder.status=ns; toast('상태 변경: '+STATUS[ns]+' (사내 대시보드 반영)'); }
    render();
  }catch(e){ toast('상태 변경 실패: '+(e.message||e)); } }
async function cancelStatus(){ const i=STATUS_ORDER.indexOf(curOrder.status);
  if(i<=0) return;
  const ns=STATUS_ORDER[i-1];
  try{
    if(curOrder.status==='insp'){ await portalApi.cancelInspection(curOrder.no); curOrder.inspReqNo=''; } // 검사신청 DB 취소(영속)
    else{ await portalApi.updateStatus(curOrder.no, ns); }
    curOrder.status=ns;
    if(STATUS_ORDER.indexOf(ns)<2) curOrder.inspReqNo='';
    toast('단계 취소: '+STATUS[ns]+' (사내 대시보드 반영)'); render();
  }catch(e){ toast('취소 실패: '+(e.message||e)); } }

let pendingFiles=[];
function openUpload(){ if(!curOrder){toast('발주를 먼저 선택하세요'); return;} uploadTag='작업';
  const bg=document.createElement('div'); bg.className='sheet-bg'; bg.id='uploadSheet';
  bg.onclick=e=>{ if(e.target===bg) closeSheet(); };
  bg.innerHTML=`<div class="sheet"><div class="grab"></div><h3>사진 등록 — ${curOrder.no}</h3>
    <div class="sp" style="font-size:11.5px;color:var(--muted)">발주·품목 단위 증빙 사진. 사내 검사 증빙으로 연계됩니다.</div>
    <div class="lab">사진 태그</div><div class="tagpick" id="tagpick">${TAGS.map(t=>`<div class="tp ${t===uploadTag?'on':''}" onclick="pickTag('${t}')">${t}</div>`).join('')}</div>
    <div class="lab">코멘트 (선택)</div><textarea id="upCmt" rows="2" placeholder="예: 1차 가공 완료분, 치수 검사 결과 등"></textarea>
    <div class="btn-row" style="margin-top:16px"><button class="btn ghost block" onclick="closeSheet()">취소</button><button class="btn pri block" onclick="pickFiles()">📷 사진 선택</button></div></div>`;
  $('.phone').appendChild(bg); }
function pickTag(t){ uploadTag=t; document.querySelectorAll('#tagpick .tp').forEach(e=>e.classList.toggle('on', e.textContent===t)); }
function closeSheet(){ const s=$('#uploadSheet'); if(s) s.remove(); }
function pickFiles(){ $('#fileInput').click(); }
$('#fileInput').addEventListener('change', async function(e){
  const files=[...e.target.files]; if(!files.length) return;
  const cmt=$('#upCmt')?$('#upCmt').value:'';
  closeSheet(); toast('업로드 중…');
  try{
    for(const f of files){ await portalApi.uploadPhoto(curOrder.no, f, {tag:uploadTag, cmt:cmt||'(코멘트 없음)'}); }
    await loadOrders(); curOrder=orders.find(o=>o.no===curOrder.no);
    toast(files.length+'장 등록 완료 (사내 연계 반영)'); render();
  }catch(err){ toast('사진 업로드 실패: '+(err.message||err)); }
  e.target.value=''; });
function lightbox(i){ const p=curOrder.photos[i];
  const lb=document.createElement('div'); lb.className='lightbox'; lb.id='lb';
  const chkTxt=p.chk==='ok'?`<span style="color:#7fe0a8">✓ 구매·품질 확인됨${p.reviewBy?' · '+p.reviewBy:''}</span>`
    :p.chk==='rej'?`<span style="color:#ff9a8a">✕ 반려됨 — 재촬영 요청${p.rejReason?'<br>사유: '+p.rejReason:''}</span>`
    :'<span style="opacity:.7">확인 대기중</span>';
  lb.innerHTML=`<span class="x" onclick="document.getElementById('lb').remove()">✕</span><img src="${p.src}" onerror="photoErr(this)">
    <div class="lb-meta"><div class="tg">${p.tag}</div><br>${p.cmt||''}<br><span style="opacity:.7">${p.by} · ${p.t}</span><br><br>${chkTxt}</div>
    ${p.chk?'':`<div class="lb-act"><button class="btn ghost sm" onclick="delPhoto(${i})" style="background:rgba(255,255,255,.16);color:#fff">🗑 삭제</button></div>`}`;
  $('.phone').appendChild(lb); }
// 사진 삭제 — 검토(확인/반려) 전 본인 업로드 건만(RLS가 DB 레벨에서도 강제)
async function delPhoto(i){ const p=curOrder.photos[i]; if(!p) return;
  if(p.chk){ toast('검토된 사진은 삭제할 수 없습니다 (증빙 보존)'); return; }
  if(!confirm('이 사진을 삭제할까요?')) return;
  const lb=$('#lb'); if(lb) lb.remove();
  try{ await portalApi.deletePhoto(p); await loadOrders(); curOrder=orders.find(o=>o.no===curOrder.no);
    toast('사진 삭제 완료 (사내 대시보드 반영)'); render();
  }catch(e){ toast('삭제 실패: '+(e.message||e)); } }
function openPhotoLightbox(no,i){ curOrder=orders.find(o=>o.no===no); lightbox(i); }

function renderPhotos(){
  const all=[]; orders.forEach(o=>o.photos.forEach(p=>all.push(p)));
  screen().innerHTML=`<div class="pad"><div class="stat-row">
    <div class="stat"><div class="n">${all.length}</div><div class="l">전체 사진</div></div>

}
function renderMessages(){
  const withMsg=orders.filter(o=>o.msgs.length).slice().sort((a,b)=>b.msgs[b.msgs.length-1].t.localeCompare(a.msgs[a.msgs.length-1].t));
  screen().innerHTML=`<div class="pad">${withMsg.length?withMsg.map(o=>{const last=o.msgs[o.msgs.length-1]; const unread=o.msgs.some(m=>m.who==='them'&&!m.read_at);
    return `<div class="card po-card" onclick="openThread('${o.no}')"><div class="po-top"><div class="po-no">${o.no}</div><span class="po-date">${last.t}</span></div>
      <div class="po-item" style="margin:7px 0 0; color:${unread?'#1c2530':'#7a8493'}; font-weight:${unread?'600':'400'}">${last.who==='me'?'나: ':'💬 '}${last.text}</div>
      ${unread?'<div style="margin-top:6px"><span class="badge st-insp">● 새 메시지</span></div>':''}</div>`;}).join(''):`<div class="empty"><span class="ic">💬</span>메시지가 없습니다.</div>`}
    <div class="note">메시지는 발주번호를 컨텍스트로 구매 담당자와 연결되며 사내에서도 확인됩니다.</div></div>`;
}
function renderThread(){
  const o=curOrder;
  screen().innerHTML=`<div class="pad"><div class="card" style="padding:11px 13px; margin-bottom:14px; background:var(--soft)">
    <div style="font-size:11.5px; color:var(--muted)">발주 컨텍스트</div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:3px"><b style="color:var(--navy)">${o.no}</b><span class="badge ${stCls[o.status]}">${STATUS[o.status]}</span></div>
    <div style="font-size:12px; color:#55606e; margin-top:5px">담당: ${o.buyer?`${o.buyer.name} (${o.buyer.team})`:'구매팀'} · ${(o.items[0]?.nm)||'품목'}${o.items.length>1?` 외 ${o.items.length-1}건`:''}</div></div>
    <div class="msg-wrap" id="msgWrap">${o.msgs.length?o.msgs.map(m=>msgBubble(m)).join(''):'<div class="empty" style="padding:30px"><span class="ic">👋</span>첫 메시지를 보내보세요.</div>'}</div>
    <div style="height:10px"></div></div>`;
  setTimeout(()=>{const s=screen(); s.scrollTop=s.scrollHeight;},30);
}
function msgBubble(m){ return `<div class="msg ${m.who}">${m.who==='them'?`<div class="who">${m.name||'구매 담당자'}</div>`:''}<div>${m.text}</div><div class="mt">${m.t}</div></div>`; }
async function sendMsg(){ const inp=$('#msgInput'); const v=inp.value.trim(); if(!v) return; inp.value='';
  try{ await portalApi.sendMessage(curOrder.no, v, 'supplier', VENDOR.contact ? `${VENDOR.contact}(${VENDOR.name})` : VENDOR.name);
    await loadOrders(); curOrder=orders.find(o=>o.no===curOrder.no); renderThread();
  }catch(e){ toast('전송 실패: '+(e.message||e)); inp.value=v; } }

function renderProfile(){
  const total=orders.length, prod=orders.filter(o=>o.status==='prod').length, insp=orders.filter(o=>o.status==='insp').length, done=orders.filter(o=>o.status==='done').length;
  screen().innerHTML=`<div class="pad"><div class="prof-head"><div class="av">🏭</div><div class="nm">${VENDOR.name}</div><div class="co">${VENDOR.code} · ${VENDOR.user}</div></div>
    <div class="stat-row"><div class="stat"><div class="n">${total}</div><div class="l">전체 발주</div></div>
      <div class="stat amber"><div class="n">${prod}</div><div class="l">생산중</div></div>
      <div class="stat" style="--x:0"><div class="n" style="color:var(--purple)">${insp}</div><div class="l">검수요청</div></div>
      <div class="stat green"><div class="n">${done}</div><div class="l">완료</div></div></div>
    ${(()=>{ const b=orders.find(o=>o.buyer)?.buyer; return b?`<div class="prow"><span>담당 구매자</span><span class="v">${b.name} · ${b.team}${b.phone?` · ${b.phone}`:''}</span></div>`:''; })()}
    <div class="prow"><span>담당자</span><span class="v">${VENDOR.contact||'-'}</span></div>
    <div class="prow"><span>로그인 계정</span><span class="v">${VENDOR.user||'-'}</span></div>
    <div class="prow"><span>사내 연계</span><span class="v" style="color:var(--green);font-weight:700">🔗 실시간 ON</span></div>
    <div style="font-size:11.5px;color:var(--amber);background:var(--softamber);border-radius:9px;padding:9px 12px;margin-top:14px">🔑 관리자가 발급한 임시 비밀번호를 쓰고 계시면, 본인 비밀번호로 변경해 주세요.</div>
    <button class="btn pri block" style="margin-top:9px" onclick="openPwChange()">🔑 비밀번호 변경</button>
    <button class="btn ghost block" style="margin-top:9px" onclick="logout()">로그아웃</button>
    <div class="note">제일엠앤에스 협력사 발주·사진등록 포털 (하이브리드 앱 · Supabase 실연동)<br>등록 사진·상태·검수요청이 사내 외주 발주·검사 대시보드에 실시간 반영됩니다.</div></div>`;
}
async function logout(){ try{ await supabase.auth.signOut(); }catch(e){} location.replace('../app/vendor-login.html'); }

// 본인 비밀번호 변경
function openPwChange(){
  const bg=document.createElement('div'); bg.className='sheet-bg'; bg.id='pwSheet';
  bg.onclick=e=>{ if(e.target===bg) closePwSheet(); };
  bg.innerHTML=`<div class="sheet"><div class="grab"></div><h3>비밀번호 변경</h3>
    <div style="font-size:11.5px;color:var(--muted)">새 비밀번호로 변경합니다. 변경 후 다음 로그인부터 적용됩니다.</div>
    <div class="lab">새 비밀번호 (8자 이상)</div><input id="pw1" type="password" autocomplete="new-password" style="width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-size:14px;background:var(--bg)">
    <div class="lab">새 비밀번호 확인</div><input id="pw2" type="password" autocomplete="new-password" style="width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-size:14px;background:var(--bg)">
    <div class="btn-row" style="margin-top:16px"><button class="btn ghost block" onclick="closePwSheet()">취소</button><button class="btn pri block" onclick="submitPwChange()">변경</button></div></div>`;
  $('.phone').appendChild(bg);
}
function closePwSheet(){ const s=$('#pwSheet'); if(s) s.remove(); }
async function submitPwChange(){
  const p1=($('#pw1')||{}).value||'', p2=($('#pw2')||{}).value||'';
  if(p1.length<8) return toast('비밀번호는 8자 이상이어야 합니다');
  if(p1!==p2) return toast('비밀번호 확인이 일치하지 않습니다');
  try{ await portalApi.changePassword(p1); closePwSheet(); toast('✅ 비밀번호가 변경되었습니다'); }
  catch(e){ toast('변경 실패: '+(e.message||e)); }
}

let toastTimer;
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2400); }

/* ===== PWA: 매니페스트 동적 주입 (풀스크린 standalone 지원 · 별도 설치 버튼 없음) ===== */
(function(){
  var icon="data:image/svg+xml,"+encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512'><rect width='512' height='512' rx='112' fill='#1a2f4e'/><text x='256' y='340' font-size='260' text-anchor='middle'>🏭</text></svg>");
  var manifest={ name:"제일메디칼 협력사 발주 포털", short_name:"협력사 포털", description:"협력사 발주 조회·사진등록·검수요청 (사내 실시간 연계)",
    start_url:".", scope:".", display:"standalone", orientation:"portrait", background_color:"#1a2f4e", theme_color:"#1a2f4e",
    icons:[{src:icon,sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}] };
  try{
    var blob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
    var link=document.createElement("link"); link.rel="manifest"; link.href=URL.createObjectURL(blob);
    document.head.appendChild(link);
  }catch(e){}
})();
/* 인라인 onclick(전역) 노출 — module 스코프 격리 대응 */
Object.assign(window, { goBack, toast, switchTab, openOrder, openThread, setFilter, setSearch, advanceStatus, cancelStatus, openUpload, pickTag, closeSheet, pickFiles, lightbox, delPhoto, openPhotoLightbox, photoErr, sendMsg, logout, showAlerts, openPwChange, closePwSheet, submitPwChange });

/* init: 협력사 세션 확인 → 발주 로드 */
initPortal();
</script>
